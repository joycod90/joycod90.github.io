<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Access Granted</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  /* ─── Reset & Base ─────────────────────────────────────── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    height: 100%;
    height: -webkit-fill-available;
  }

  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;   /* iOS Safari fix */
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: url('bg.jpg') no-repeat center center / cover;
    background-attachment: fixed;         /* évite le scroll du bg sur iOS */
    font-family: 'Montserrat', sans-serif;
    color: #F5E6C8;
    overflow: hidden;
    position: fixed;                      /* verrou absolu du scroll */
    inset: 0;
  }

  /* ─── Écran noir initial ───────────────────────────────── */
  #black {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    opacity: 1;
    transition: opacity 1.2s ease;
    pointer-events: auto;                 /* bloque les taps pendant le fade */
  }

  #black.gone {
    opacity: 0;
    pointer-events: none;                 /* libère dès le fade terminé */
  }

  /* ─── Overlay ambiance ─────────────────────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(0, 0, 0, 0.55);
    animation: breathe 5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes breathe {
    0%, 100% { background: rgba(0,0,0,0.55); }
    50%       { background: rgba(0,0,0,0.72); }
  }

  /* ─── Grain overlay (texture premium) ─────────────────── */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 2;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* ─── Container principal ──────────────────────────────── */
  .container {
    position: relative;
    z-index: 10;
    padding: 24px 20px;
    max-width: 92%;
    width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ─── Titre ────────────────────────────────────────────── */
  #title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 7vw, 2.8rem);
    letter-spacing: 0.18em;
    line-height: 1;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    margin-bottom: 6px;
    /* lueur dorée subtile */
    text-shadow: 0 0 40px rgba(245, 220, 160, 0.35);
  }

  #title.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ─── Séparateur fin ───────────────────────────────────── */
  .divider {
    width: 40px;
    height: 1px;
    background: rgba(245, 230, 200, 0.4);
    margin: 14px auto;
    opacity: 0;
    transition: opacity 0.8s ease, width 1s ease;
  }

  .divider.visible {
    opacity: 1;
    width: 80px;
  }

  /* ─── Sprite léopard ───────────────────────────────────── */
  /* 
    IMPORTANT : leopard.png doit être une sprite sheet horizontale
    avec 6 frames, chaque frame faisant exactement frameWidth × frameHeight px.
    Exemple : 1080×180px pour des frames de 180×180px.
    Adapter frameWidth et frameHeight dans le JS.
  */
  #sprite {
    width: 180px;
    height: 90px;
    /* background-size en px dans le JS pour éviter les bugs de % */
    background: url('leopard.png') 0 center no-repeat;
    background-size: auto 90px;          /* hauteur fixe, largeur proportionnelle */
    margin: 6px auto;
    opacity: 0;
    transition: opacity 0.8s ease;
    filter: drop-shadow(0 0 12px rgba(245, 220, 160, 0.25));
  }

  #sprite.visible {
    opacity: 1;
  }

  /* ─── Textes ───────────────────────────────────────────── */
  .tagline {
    font-weight: 300;
    font-size: clamp(0.82rem, 3.2vw, 1rem);
    letter-spacing: 0.12em;
    color: #D6C6A5;
    line-height: 1.9;
    margin-top: 12px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .tagline.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ─── Barre de progression ─────────────────────────────── */
  #progressTrack {
    width: min(70vw, 240px);
    height: 2px;
    background: rgba(255,255,255,0.12);
    border-radius: 1px;
    margin: 22px auto 10px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #progressTrack.visible {
    opacity: 1;
  }

  #progressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, transparent, #F5E6C8, transparent);
    border-radius: 1px;
    /* la durée est injectée par JS pour rester synchronisée avec timeLeft */
    transition: width linear;
  }

  /* ─── Countdown ────────────────────────────────────────── */
  #countdown {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.6rem, 10vw, 3.8rem);
    letter-spacing: 0.05em;
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 0.6s ease, transform 0.6s ease, color 0.4s ease;
    line-height: 1;
    margin-top: 4px;
  }

  #countdown.visible {
    opacity: 1;
    transform: scale(1);
  }

  #countdown.urgent {
    color: #e8c060;
    animation: urgentPulse 0.6s ease-in-out infinite;
  }

  @keyframes urgentPulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.06); }
  }

  /* ─── Texte final ──────────────────────────────────────── */
  #finalText {
    font-size: clamp(0.7rem, 2.5vw, 0.82rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(245, 230, 200, 0.5);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.7s ease, transform 0.7s ease;
    margin-top: 10px;
  }

  #finalText.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ─── Flash de sortie ──────────────────────────────────── */
  #exitFlash {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  #exitFlash.flash {
    opacity: 1;
  }
</style>
</head>

<body>

  <div id="black"></div>
  <div class="overlay"></div>
  <div class="grain"></div>
  <div id="exitFlash"></div>

  <div class="container">
    <h1 id="title">ACCESS GRANTED</h1>

    <div class="divider" id="divider"></div>

    <div id="sprite"></div>

    <p class="tagline" id="text1">You have been chosen.</p>
    <p class="tagline" id="text2">The gates are opening…</p>
    <p class="tagline" id="text3">Stand by.</p>

    <div id="progressTrack">
      <div id="progressBar"></div>
    </div>

    <div id="countdown">7</div>
    <div id="finalText">Only a few will pass.</div>
  </div>

  <audio id="jingle" src="jingle.mp3" preload="auto"></audio>

<script>
  // ─── Configuration ─────────────────────────────────────
  const REDIRECT_URL  = "TON_LIEN_FINAL";   // ← à remplacer
  const COUNTDOWN_SEC = 7;
  const FRAME_WIDTH   = 180;                // px — largeur d'une frame du sprite
  const TOTAL_FRAMES  = 6;
  const FRAME_RATE_MS = 130;               // ms entre chaque frame

  // ─── Refs DOM ──────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const black       = $("black");
  const sprite      = $("sprite");
  const countdown   = $("countdown");
  const finalText   = $("finalText");
  const progressTrack = $("progressTrack");
  const progressBar   = $("progressBar");
  const exitFlash   = $("exitFlash");
  const audio       = $("jingle");

  // ─── Helpers ───────────────────────────────────────────
  function show(el, delay = 0) {
    setTimeout(() => el.classList.add("visible"), delay);
  }

  function tryPlayAudio() {
    audio.play().catch(() => {});
  }

  // ─── Fallback audio au premier touch ──────────────────
  // Un seul listener, retiré après le premier déclenchement
  document.addEventListener("touchstart", tryPlayAudio, { once: true, passive: true });

  // ─── Sprite animation ─────────────────────────────────
  let frame = 0;
  const spriteInterval = setInterval(() => {
    frame = (frame + 1) % TOTAL_FRAMES;
    sprite.style.backgroundPositionX = `${-frame * FRAME_WIDTH}px`;
  }, FRAME_RATE_MS);

  // ─── Timeline principale ───────────────────────────────

  // T+0.5s : fade out écran noir
  setTimeout(() => {
    black.classList.add("gone");
    // retirer du DOM après la transition pour libérer le touch
    setTimeout(() => black.remove(), 1300);
  }, 500);

  // T+1.2s : titre + séparateur
  setTimeout(() => {
    show($("title"));
    show($("divider"), 200);
  }, 1200);

  // T+2.1s : léopard
  setTimeout(() => show(sprite), 2100);

  // T+2.7s : textes en cascade
  setTimeout(() => show($("text1")), 2700);
  setTimeout(() => show($("text2")), 3200);
  setTimeout(() => show($("text3")), 3700);

  // T+3.0s : audio (après l'affichage d'au moins un élément = probablement safe)
  setTimeout(tryPlayAudio, 3000);

  // T+4.2s : countdown + barre de progression
  setTimeout(() => {
    let timeLeft = COUNTDOWN_SEC;

    // Afficher les éléments
    show(countdown);
    show(finalText);
    progressTrack.classList.add("visible");

    // Déclencher la barre en CSS (durée = timeLeft secondes)
    // requestAnimationFrame pour garantir que le display est paint avant la transition
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        progressBar.style.transition = `width ${timeLeft}s linear`;
        progressBar.style.width = "100%";
      });
    });

    // Démarrer le timer ICI, synchronisé avec l'apparition
    const timer = setInterval(() => {
      timeLeft--;

      if (timeLeft > 0) {
        countdown.textContent = timeLeft;
      }

      // Tension finale
      if (timeLeft <= 3 && timeLeft > 0) {
        countdown.classList.add("urgent");
        sprite.style.filter = "drop-shadow(0 0 16px rgba(245,200,80,0.6)) brightness(1.3)";
      }

      // Redirection
      if (timeLeft <= 0) {
        clearInterval(timer);
        clearInterval(spriteInterval);

        // Flash blanc de sortie
        exitFlash.classList.add("flash");
        setTimeout(() => {
          window.location.href = REDIRECT_URL;
        }, 280);
      }
    }, 1000);

  }, 4200);
</script>

</body>
</html>
