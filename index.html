<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Access Granted</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: url('bg.jpg') no-repeat center/cover;
  font-family: 'Montserrat', sans-serif;
  color: #F5E6C8;
  overflow: hidden;
}

/* overlay cinématique */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* container responsive */
.container {
  position: relative;
  z-index: 2;
  padding: 20px;
  max-width: 90%;
  animation: fadeIn 1.2s ease;
}

/* titre adaptatif */
h1 {
  font-family: 'Playfair Display', serif;
  letter-spacing: 0.12em;
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  margin-bottom: 10px;
}

/* texte adaptatif */
p {
  color: #D6C6A5;
  font-size: clamp(0.9rem, 3.5vw, 1.2rem);
  margin: 8px 0;
}

/* countdown */
#countdown {
  margin-top: 25px;
  font-size: clamp(1.5rem, 6vw, 2.2rem);
}

/* barre de chargement */
#line {
  width: 70vw;
  max-width: 250px;
  height: 3px;
  background: rgba(255,255,255,0.2);
  margin: 20px auto;
  position: relative;
  overflow: hidden;
  border-radius: 2px;
}

/* léopard visible + stylé */
#leopard {
  position: absolute;
  left: 0;
  top: -20px;
  font-size: clamp(1.8rem, 6vw, 2.5rem);
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.5));
  transition: transform 0.1s linear;
}

/* animation */
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1>ACCESS GRANTED</h1>

  <p>You have been selected.</p>

  <p>Stand by…</p>

  <div id="line">
    <span id="leopard">🐆</span>
  </div>

  <div id="countdown">7</div>
</div>

<audio id="jingle" src="jingle.mp3" preload="auto"></audio>

<script>
const leopard = document.getElementById("leopard");
const countdownEl = document.getElementById("countdown");
const audio = document.getElementById("jingle");

let position = 0;
let frame = 0;
let timeLeft = 7;

// 🔊 mobile fix (interaction requise parfois)
document.body.addEventListener("touchstart", () => {
  audio.play().catch(()=>{});
}, { once: true });

setTimeout(() => {
  audio.play().catch(()=>{});
}, 500);

// 🐆 animation fluide 4 frames
setInterval(() => {
  frame++;

  switch(frame % 4) {
    case 0:
      leopard.style.transform = "translateY(0px) scaleX(1)";
      break;
    case 1:
      leopard.style.transform = "translateY(-4px) scaleX(1.1)";
      break;
    case 2:
      leopard.style.transform = "translateY(2px) scaleX(0.9)";
      break;
    case 3:
      leopard.style.transform = "translateY(-2px) scaleX(1.1)";
      break;
  }

}, 120);

// déplacement responsive
setInterval(() => {
  const maxWidth = document.getElementById("line").offsetWidth - 40;

  position += 2;
  leopard.style.left = position + "px";

  if (position > maxWidth) {
    position = 0;
  }
}, 20);

// countdown
const timer = setInterval(() => {
  timeLeft--;
  countdownEl.textContent = timeLeft;

  if (timeLeft <= 0) {
    clearInterval(timer);
    window.location.href = "https://drive.google.com/file/d/1YNSWG5gqM5v1o748F2eNL6bNJ0nv5FB8/view?usp=drive_link";
  }
}, 1000);
</script>

</body>
</html>
